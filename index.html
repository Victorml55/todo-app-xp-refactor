<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo App - Refactorizado</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="top-bar">
    <div class="top-left">
      <span class="app-title">Lista de Tareas</span>
      <button id="themeBtn">🌙</button>
    </div>
    <div class="top-center">
      <span class="filters-label">Filtros</span>
      <div class="status-filters">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="pending">Pendientes</button>
        <button class="filter-btn" data-filter="completed">Completadas</button>
      </div>
      <div class="tag-filters" id="tagFilters"></div>
    </div>
    <div class="top-right">
      <input type="text" id="searchInput" placeholder="Buscar tareas...">
    </div>
  </nav>

  <div class="container">

    <section class="add-section">
      <div class="add-row">
        <div class="field-group">
          <label for="taskTitle">Título</label>
          <input type="text" id="taskTitle" placeholder="Nombre de la tarea..." autocomplete="off">
        </div>
        <div class="field-group field-grow">
          <label for="taskDesc">Descripción</label>
          <input type="text" id="taskDesc" placeholder="Descripción opcional..." autocomplete="off">
        </div>
        <div class="field-group">
          <label for="taskDueDate">Fecha límite</label>
          <input type="date" id="taskDueDate">
        </div>
        <button id="addBtn">+ Agregar</button>
      </div>
      <div class="add-row-tags">
        <div class="field-group">
          <label>Etiquetas</label>
          <div class="tag-selector" id="newTaskTagSelector"></div>
        </div>
      </div>
    </section>

    <section class="tag-management">
      <div class="tag-mgmt-row">
        <span class="section-label">Etiquetas</span>
        <div class="new-tag-form">
          <input type="text" id="newTagInput" placeholder="Crear etiqueta..." maxlength="20" autocomplete="off">
          <button id="createTagBtn">Crear</button>
        </div>
      </div>
      <div class="tag-list-manage" id="tagListManage"></div>
    </section>

    <section class="table-section">
      <div class="table-wrap">
        <table id="taskTable">
          <thead>
            <tr>
              <th class="col-title">Título</th>
              <th class="col-desc">Descripción</th>
              <th class="col-date">Fecha de creación</th>
              <th class="col-date">Fecha límite</th>
              <th class="col-done">Completado</th>
              <th class="col-actions">Acciones</th>
            </tr>
          </thead>
          <tbody id="taskTableBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <p>No hay tareas aquí.</p>
      </div>
    </section>

  </div>

  <!-- MODAL EDICIÓN -->
  <div class="modal-overlay" id="editModal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2>Editar Tarea</h2>
        <button class="modal-close" id="closeEditBtn">✕</button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label for="editTitle">Título</label>
          <input type="text" id="editTitle" placeholder="Título de la tarea...">
        </div>
        <div class="field-group">
          <label for="editDesc">Descripción</label>
          <input type="text" id="editDesc" placeholder="Descripción...">
        </div>
        <div class="field-group">
          <label for="editDueDate">Fecha límite</label>
          <input type="date" id="editDueDate">
        </div>
        <div class="field-group">
          <label>Etiquetas</label>
          <div class="tag-selector" id="editTagSelector"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel-modal" id="cancelEditBtn">Cancelar</button>
        <button class="btn-save-modal" id="saveEditBtn">Guardar cambios</button>
      </div>
    </div>
  </div>

  <!-- MODAL CONFIRMAR ELIMINAR -->
  <div class="modal-overlay" id="confirmModal" style="display:none;">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Confirmar eliminación</h2>
      </div>
      <div class="modal-body">
        <p>¿Estás seguro de que deseas eliminar esta tarea? Esta acción no se puede deshacer.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel-modal" id="cancelDeleteBtn">Cancelar</button>
        <button class="btn-delete-confirm" id="confirmDeleteBtn">Eliminar</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
