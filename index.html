<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo App - Refactorizado</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <button id="themeBtn" onclick="toggleTheme()">🌙 Modo Oscuro</button>
    <h1>Lista de Tareas</h1>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Escribe una tarea...">
      <button id="addBtn">Agregar</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Todas</button>
      <button class="filter-btn" data-filter="pending">Pendientes</button>
      <button class="filter-btn" data-filter="completed">Completadas</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
